<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KDMR Media — The Voice of Borneo's Indigenous Peoples</title>
    <meta name="description" content="Cultural archive, Hall of Fame, and community discovery platform." />
    <link rel="stylesheet" href="./src/index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#0a0a0a] text-[#f0f0f0] font-inter">
    <div class="film-grain"></div>

    <nav class="sticky top-0 z-50 bg-[#0a0a0a] border-b border-[#1e1e1e] h-[52px] flex items-center px-4">
        <div class="max-w-[1200px] mx-auto w-full flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 font-black text-xl">
                <span class="bg-[#f0a820] text-[#0a0a0a] px-1 rounded-sm">KM</span> KDMR MEDIA
            </a>
            <div class="flex items-center gap-6">
                <a href="/winners.html" class="text-sm font-medium text-gray-400 hover:text-white">Winners</a>
                <a href="/news.html" class="text-sm font-medium text-gray-400 hover:text-white">News</a>
                <button class="bg-[#f0a820] text-[#0a0a0a] text-xs font-bold px-4 py-2 rounded-sm">Join</button>
            </div>
        </div>
    </nav>

    <section id="heroSection" class="hero-cinema min-h-screen flex flex-col md:flex-row">
        <div class="hero-portrait w-full md:w-[42%] flex items-center justify-center relative bg-[#0c0800]">
            <div id="heroAvatarWrap" class="w-48 h-48 border border-[#f0a820]/20 flex items-center justify-center">
                <span id="heroInitials" class="text-6xl font-black text-[#f0a820]">--</span>
            </div>
        </div>
        <div class="hero-story flex-1 flex items-center p-8 md:p-16">
            <div class="max-w-[500px]">
                <div class="flex items-center gap-2 mb-4">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                    <span class="text-[0.6rem] font-bold tracking-widest text-[#f0a820] uppercase">Legend of the Week</span>
                </div>
                <h1 id="heroName" class="text-5xl md:text-6xl font-black mb-2">--</h1>
                <p id="heroBioText" class="text-gray-500 leading-relaxed mb-8">...</p>
                <div class="flex gap-4">
                    <button class="cta-glow bg-[#f0a820] text-[#0a0a0a] px-8 py-3 font-bold uppercase text-xs">Explore Her Story</button>
                    <button id="heroVoteBtn" class="border border-[#f0a820]/30 text-[#f0a820] px-6 py-3 font-bold uppercase text-xs">Community Vote</button>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-[1200px] mx-auto p-4 py-12">
        <h2 class="text-xs font-bold tracking-widest uppercase text-white mb-6 border-l-4 border-[#f0a820] pl-3">Discover</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-1">
            <div id="bentoSong" class="md:col-span-2 bg-[#0d0b00] p-8 min-h-[300px] flex flex-col justify-end border border-yellow-900/20">
                <span class="text-[0.6rem] font-bold uppercase text-[#f0a820] mb-2">This Season's Sound</span>
                <h3 id="bentoSongTitle" class="text-2xl font-black">--</h3>
            </div>
            <div id="bentoCostume" class="bg-[#03100a] p-6 border border-green-900/20">
                <span class="text-[0.6rem] font-bold uppercase text-[#4ade80] mb-2">Winning Costume</span>
                <p id="bentoCostumeName" class="text-sm font-bold">--</p>
            </div>
            <div id="countdownBox" class="bg-[#03030f] p-6 border border-blue-900/20 cursor-pointer">
                <span class="text-[0.6rem] font-bold uppercase text-[#818cf8] mb-2">Live Countdown</span>
                <div id="countdownNum" class="text-5xl font-black">--</div>
                <p class="text-[0.6rem] text-blue-900 uppercase">Days to State Final</p>
            </div>
        </div>
    </section>

    <script type="module" src="./src/script.js"></script>
</body>
</html>
