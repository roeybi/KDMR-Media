<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/index.css" />
  <style>
    .film-grain { position:fixed; inset:0; z-index:9998; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E"); background-size:180px 180px; opacity:0.026; }
    .gate-overlay { position:fixed; inset:0; background:#0a0a0a; display:flex; align-items:center; justify-content:center; z-index:9999; }
    .gate-card { text-align:center; max-width:360px; padding:40px; }
    .gate-card h1 { font-size:1.6rem; font-weight:800; color:#f0f0f0; margin-bottom:8px; }
    .gate-card p { color:#888; font-size:0.85rem; margin-bottom:24px; }
    .gate-input { width:100%; background:#0a0a0a; border:1px solid #333; border-radius:2px; padding:14px; color:#f0f0f0; font-size:1rem; text-align:center; letter-spacing:0.15em; outline:none; margin-bottom:16px; }
    .gate-input:focus { border-color:#f0a820; }
    .gate-btn { width:100%; background:#f0a820; color:#0a0a0a; font-weight:800; padding:14px; border:none; border-radius:2px; cursor:pointer; }
    .gate-error { color:#ef4444; font-size:0.8rem; margin-top:12px; min-height:1.2em; }
    .queue-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .queue-table th { text-align:left; padding:12px 16px; background:#111; color:#f0a820; font-weight:700; text-transform:uppercase; font-size:0.7rem; letter-spacing:0.06em; border-bottom:1px solid #222; }
    .queue-table td { padding:12px 16px; border-bottom:1px solid #1a1a1a; color:#ccc; vertical-align:middle; }
    .queue-table tr:hover td { background:rgba(240,168,32,0.04); }
    .thumb { width:48px; height:48px; object-fit:cover; border-radius:2px; border:1px solid #333; }
    .status-badge { display:inline-block; padding:3px 10px; border-radius:2px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
    .status-pending { background:rgba(240,168,32,0.12); color:#f0a820; }
    .status-approved { background:rgba(34,197,94,0.12); color:#4ade80; }
    .status-rejected { background:rgba(239,68,68,0.12); color:#f87171; }
    .copy-btn { background:#1a1a1a; border:1px solid #333; color:#aaa; padding:4px 10px; border-radius:2px; font-size:0.72rem; cursor:pointer; transition:all 0.2s; }
    .copy-btn:hover { border-color:#f0a820; color:#f0a820; }
    .copy-btn.copied { border-color:#22c55e; color:#22c55e; }
    .agent-btn { border-color:#f0a820 !important; color:#f0a820 !important; font-weight:600; }
    .agent-btn:hover { background:#f0a820 !important; color:#000 !important; }
    .action-btn { border:none; padding:4px 10px; border-radius:2px; font-size:0.72rem; cursor:pointer; font-weight:600; transition:all 0.2s; }
    .action-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .approve-btn { background:#16a34a; color:#fff; }
    .approve-btn:hover:not(:disabled) { background:#15803d; }
    .reject-btn { background:#991b1b; color:#fff; }
    .reject-btn:hover:not(:disabled) { background:#7f1d1d; }
    .refresh-btn { background:#1a1a1a; border:1px solid #333; color:#aaa; padding:8px 16px; border-radius:2px; font-size:0.8rem; cursor:pointer; }
    .refresh-btn:hover { border-color:#f0a820; color:#f0a820; }
    .empty-state { text-align:center; padding:60px 24px; color:#555; }
    .filter-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-btn { background:#111; border:1px solid #222; color:#888; padding:6px 14px; border-radius:2px; font-size:0.75rem; cursor:pointer; }
    .filter-btn.active { border-color:#f0a820; color:#f0a820; background:rgba(240,168,32,0.08); }
    .tab-bar { display:flex; gap:4px; border-bottom:1px solid #1a1a1a; margin-bottom:24px; }
    .tab-btn { background:none; border:none; color:#888; font-size:0.82rem; font-weight:600; padding:10px 20px; cursor:pointer; border-bottom:2px solid transparent; }
    .tab-btn.active { color:#f0a820; border-bottom-color:#f0a820; }
    .label-valid { background:rgba(34,197,94,0.12); color:#4ade80; }
    .label-kiv { background:rgba(240,168,32,0.12); color:#f0a820; }
    .label-spam { background:rgba(239,68,68,0.12); color:#f87171; }
    .label-new { background:rgba(168,85,247,0.12); color:#c084fc; }
    .github-btn { background:#333; color:#fff; }
    .github-btn:hover:not(:disabled) { background:#555; }
    .dismiss-btn { background:#7f1d1d; color:#fff; }
    .dismiss-btn:hover:not(:disabled) { background:#991b1b; }
    .pat-input { background:#0a0a0a; border:1px solid #333; color:#f0a820; padding:8px 12px; font-size:0.72rem; border-radius:2px; font-family:monospace; width:280px; }
    .pat-input:focus { border-color:#f0a820; outline:none; }
    .feedback-msg { max-width:320px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .feedback-msg.expanded { white-space:normal; overflow:visible; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-[#f0f0f0] font-['Inter',sans-serif] min-h-screen">
  <div class="film-grain"></div>

  <!-- Gate -->
  <div id="adminGate" class="gate-overlay">
    <div class="gate-card">
      <div style="width:48px;height:48px;border-radius:50%;background:#f0a820;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Admin Dashboard</h1>
      <p>View and manage contributor photo submissions and user feedback.</p>
      <input type="password" id="adminPasscode" class="gate-input" placeholder="••••••" maxlength="20">
      <button id="adminGateBtn" class="gate-btn">Enter Dashboard</button>
      <p id="adminGateError" class="gate-error"></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="queueContainer" style="display:none;">
    <header style="border-bottom:1px solid #1a1a1a; padding:16px 24px;">
      <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;background:#f0a820;border-radius:2px;display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg>
          </div>
          <span style="font-weight:800;font-size:0.95rem;color:#f0f0f0;">KDMR-MEDIA</span>
          <span style="font-size:0.75rem;color:#f0a820;font-weight:600;">ADMIN</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <label style="font-size:0.72rem;color:#666;">GitHub PAT:</label>
          <input type="password" id="githubPatInput" class="pat-input" placeholder="ghp_..." style="width:180px;" />
          <button id="refreshBtn" class="refresh-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Refresh
          </button>
        </div>
      </div>
    </header>

    <main style="padding:32px 24px;">
      <div style="max-width:1200px;margin:0 auto;">
        <!-- Tabs -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="uploads">Upload Queue</button>
          <button class="tab-btn" data-tab="feedback">Feedback</button>
        </div>

        <!-- Uploads Panel -->
        <div id="uploadsPanel">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <h1 style="font-size:1.3rem;font-weight:700;color:#f0f0f0;">Upload Queue</h1>
            <div class="filter-bar">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="pending">Pending</button>
              <button class="filter-btn" data-filter="approved">Approved</button>
              <button class="filter-btn" data-filter="rejected">Rejected</button>
            </div>
          </div>
          <div style="background:#111;border:1px solid #1a1a1a;border-radius:4px;overflow-x:auto;">
            <table class="queue-table">
              <thead>
                <tr>
                  <th>Preview</th>
                  <th>Branch</th>
                  <th>Winner</th>
                  <th>Filename</th>
                  <th>Uploaded By</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Public URL</th>
                </tr>
              </thead>
              <tbody id="queueBody">
                <tr><td colspan="8" class="empty-state">Loading submissions...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="queueStats" style="margin-top:16px;font-size:0.75rem;color:#555;"></div>
        </div>

        <!-- Feedback Panel -->
        <div id="feedbackPanel" style="display:none;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <h1 style="font-size:1.3rem;font-weight:700;color:#f0f0f0;">User Feedback</h1>
            <div class="filter-bar" id="feedbackFilterBar">
              <button class="filter-btn active" data-fbfilter="all">All</button>
              <button class="filter-btn" data-fbfilter="new">New</button>
              <button class="filter-btn" data-fbfilter="valid">Valid</button>
              <button class="filter-btn" data-fbfilter="kiv">KIV</button>
              <button class="filter-btn" data-fbfilter="spam">Spam</button>
            </div>
          </div>
          <div style="background:#111;border:1px solid #1a1a1a;border-radius:4px;overflow-x:auto;">
            <table class="queue-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Page</th>
                  <th>Message</th>
                  <th>Label</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="feedbackBody">
                <tr><td colspan="7" class="empty-state">Loading feedback...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="feedbackStats" style="margin-top:16px;font-size:0.75rem;color:#555;"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./src/admin.js"></script>
</body>
</html>
